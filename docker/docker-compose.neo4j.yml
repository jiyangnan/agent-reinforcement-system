services:
  neo4j:
    image: neo4j:5-community
    container_name: agent-reinforcement-system-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${ARS_NEO4J_USER:-neo4j}/${ARS_NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
